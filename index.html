<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Squeeze — Image Compressor and Convertor</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
  
  <link rel="stylesheet" href="style.css">
</head>
<body>
<div class="page-wrap">

  <header>
    <div class="logo">
      <div class="logo-icon">
        <svg viewBox="0 0 24 24" fill="none" stroke="#1a2200" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M13 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V9z"/>
          <polyline points="13 2 13 9 20 9"/>
          <line x1="9" y1="15" x2="15" y2="15"/>
        </svg>
      </div>
      <div>
        <div class="logo-name">Squeeze</div>
        <div class="logo-tagline">image compressor and converter by Sushant Prasai</div>
      </div>
    </div>
    <div class="privacy-pill">
      <div class="dot-green"></div>
      100% client-side — nothing uploaded
    </div>
  </header>

  <div class="drop-zone" id="dropZone">
    <div class="dz-icon">
      <svg viewBox="0 0 24 24" fill="none" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
        <rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/>
        <polyline points="21 15 16 10 5 21"/>
      </svg>
    </div>
    <div class="dz-title">Drop images to compress</div>
    <div class="dz-sub">Drag files here or click below — process multiple at once</div>
    <button class="btn-choose" id="btnChoose">
      <svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
      Choose files
    </button>
    <input type="file" id="fileInput" multiple accept="image/*" style="display:none">
    <div class="formats-hint">
      <span class="fmt-tag">JPEG</span>
      <span class="fmt-tag">PNG</span>
      <span class="fmt-tag">WebP</span>
    </div>
  </div>

  <div class="stats-row" id="statsRow" style="display:none">
    <div class="stat-chip"><div class="val" id="statFiles">0</div><div class="lbl">files</div></div>
    <div class="stat-chip"><div class="val" id="statSaved">0%</div><div class="lbl">avg saved</div></div>
    <div class="stat-chip"><div class="val" id="statSize">0 KB</div><div class="lbl">total saved</div></div>
  </div>

  <div class="queue" id="queue"></div>

</div>

<template id="cardTpl">
  <div class="card">
    <div class="prog-bar"><div class="prog-fill"></div></div>
    <div class="card-top">
      <div class="file-icon">
        <svg viewBox="0 0 24 24" fill="none" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
          <rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/>
        </svg>
      </div>
      <span class="file-name card-fname"></span>
      <button class="card-close" aria-label="Remove">
        <svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
      </button>
    </div>
    <div class="previews">
      <div class="preview-pane">
        <div class="preview-label">Original</div>
        <div class="preview-img-wrap">
          <img class="orig-img" alt="Original">
        </div>
        <div class="preview-size">
          <span class="size-val orig-size-val">—</span>
          <span class="size-dim orig-dim">—</span>
        </div>
      </div>
      <div class="preview-pane">
        <div class="preview-label">Compressed</div>
        <div class="preview-img-wrap" style="position:relative">
          <img class="comp-img" alt="Compressed">
          <div class="processing-overlay comp-overlay"><div class="spin"></div></div>
        </div>
        <div class="preview-size">
          <span class="size-val comp-size-val">—</span>
          <span class="size-dim comp-dim">—</span>
        </div>
      </div>
    </div>
    <div class="savings-bar-wrap">
      <span style="font-size:11px;font-family:'DM Mono',monospace;text-transform:uppercase;letter-spacing:.08em;color:var(--text3)">space saved</span>
      <div class="savings-track"><div class="savings-fill"></div></div>
      <span class="savings-label">—</span>
    </div>
    <div class="controls-grid">
      <div class="ctrl-block">
        <div class="ctrl-head">
          <span class="ctrl-name">Quality</span>
          <span class="ctrl-value quality-val">80%</span>
        </div>
        <input type="range" class="quality-slider" min="1" max="100" value="80" step="1">
      </div>
      <div class="ctrl-block">
        <div class="ctrl-head">
          <span class="ctrl-name">Max width</span>
          <span class="ctrl-value resize-val">2000px</span>
        </div>
        <input type="range" class="resize-slider" min="100" max="4000" value="2000" step="50">
      </div>
    </div>
    <div class="fmt-row">
      <span class="fmt-row-label">Output format</span>
      <div class="fmt-pills">
        <button class="fmt-pill active" data-fmt="jpeg">JPEG</button>
        <button class="fmt-pill" data-fmt="webp">WebP</button>
        <button class="fmt-pill" data-fmt="png">PNG</button>
      </div>
    </div>
    <div class="card-actions">
      <button class="btn-dl" disabled>
        <svg viewBox="0 0 24 24" fill="none" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
        Download
      </button>
      <button class="btn-recompress">
        <svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="23 4 23 10 17 10"/><path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"/></svg>
        Recompress
      </button>
    </div>
  </div>
</template>

<script src="app.js"></script>
</body>
</html>
